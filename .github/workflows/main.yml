name: Build and Deploy to ACR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to ACR
      run: az acr login --name [nazwa_acr]

    - name: Build Docker image
      run: docker build -t [serwer_logowania]/[nazwa_aplikacji]:latest .

    - name: Push Docker image
      run: docker push [serwer_logowania]/[nazwa_aplikacji]:latest
