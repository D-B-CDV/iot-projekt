name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build image
      run: docker build -t clickapp.azurecr.io/aplikacja-do-klikania:latest .

    - name: Push image
      run: docker push clickapp.azurecr.io/aplikacja-do-klikania:latest
