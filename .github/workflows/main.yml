name: CI/CD Full Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to ACR
      run: echo ${{ secrets.ACR_PASSWORD }} | docker login clickapp.azurecr.io -u ${{ secrets.ACR_USERNAME }} --password-stdin

    - name: Build image
      run: docker build -t clickapp.azurecr.io/aplikacja-do-klikania:latest .

    - name: Push image to ACR
      run: docker push clickapp.azurecr.io/aplikacja-do-klikania:latest

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: [NAZWA_APP_SERVICE]
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: clickapp.azurecr.io/aplikacja-do-klikania:latest
