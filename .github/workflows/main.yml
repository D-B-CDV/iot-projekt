name: Deploy to Azure App Service

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build image
      run: docker build -t clickapp.azurecr.io/aplikacja-do-klikania:latest .

    - name: Push image
      run: |
        az acr login --name clickapp
        docker push clickapp.azurecr.io/aplikacja-do-klikania:latest

    - name: Deploy
      uses: azure/webapps-deploy@v3
      with:
        app-name: [NAZWA_APP_SERVICE]
        images: clickapp.azurecr.io/aplikacja-do-klikania:latest
