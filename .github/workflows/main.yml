name: CI/CD Docker to ACR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to ACR
      run: echo ${{ secrets.ACR_PASSWORD }} | docker login clickapp.azurecr.io -u ${{ secrets.ACR_USERNAME }} --password-stdin

    - name: Build image
      run: docker build -t clickapp.azurecr.io/aplikacja-do-klikania:${{ github.run_number }} .

    - name: Push image
      run: docker push clickapp.azurecr.io/aplikacja-do-klikania:${{ github.run_number }}
