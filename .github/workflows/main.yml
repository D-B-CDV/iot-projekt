name: CI/CD Docker to ACR + Auto Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to ACR
      uses: azure/docker-login@v1
      with:
        login-server: clickapp.azurecr.io
        username: clickapp
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build image (versioned)
      run: docker build -t clickapp.azurecr.io/aplikacja-do-klikania:${{ github.run_number }} .

    - name: Push image (versioned)
      run: docker push clickapp.azurecr.io/aplikacja-do-klikania:${{ github.run_number }}
